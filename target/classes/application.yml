ckyc:
  url: https://testbed.ckycindia.in/Search/ckycverificationservice/verify
  download-url: https://testbed.ckycindia.in/Download/ckycdownloadservice/download
  validate-otp-url: https://testbed.ckycindia.in/ValidateOTP/ckycvalidationservice/validateotp
  upload-url: https://testbed.ckycindia.in/Upload/ckycuploadservice/upload
  update-url: https://testbed.ckycindia.in/Update/ckycupdateservice/update
  version: "1.3"
  fi-code: IN0106
  cersai-cert: classpath:keys/cersai.cer
  p12-path: classpath:keys/fi-keystore.p12
  p12-password: changeit
  p12-alias: mykey
  allow-non-standard-upload-update-api: false
  timeout:
    connect-ms: 10000
    read-ms: 30000
  retry:
    max-attempts: 3
    initial-backoff-ms: 500
    max-backoff-ms: 5000
    multiplier: 2.0
  download:
    otp-trigger-keywords:
      - OTP
      - ONE TIME PASSWORD
      - ENTER OTP
  upload:
    duplicate-keywords:
      - DUPLICATE
      - ALREADY EXISTS
      - RECORD EXISTS
    max-image-bytes: 1048576
    allowed-image-formats:
      - JPG
      - JPEG
      - PNG
  validation:
    ckyc-no-length: 14
  logging:
    max-payload-length: 2000
server:
  port: 8089

# -----------------------------
# Application
# -----------------------------
spring.application.name=${SPRING_APPLICATION_NAME:ckyc-client}
server.port=${SERVER_PORT:8089}

# -----------------------------
# CKYC Endpoints (override via env)
# For dummy project, point these URLs to your local/mock server.
# Example:
# CKYC_BASE_URL=http://localhost:9090/mock-ckyc
# -----------------------------
ckyc.url=${CKYC_SEARCH_URL:https://testbed.ckycindia.in/Search/ckycverificationservice/verify}
ckyc.download-url=${CKYC_DOWNLOAD_URL:https://testbed.ckycindia.in/Download/ckycdownloadservice/download}
ckyc.validate-otp-url=${CKYC_VALIDATE_OTP_URL:https://testbed.ckycindia.in/ValidateOTP/ckycvalidationservice/validateotp}
ckyc.upload-url=${CKYC_UPLOAD_URL:https://testbed.ckycindia.in/Upload/ckycuploadservice/upload}
ckyc.update-url=${CKYC_UPDATE_URL:https://testbed.ckycindia.in/Update/ckycupdateservice/update}

# -----------------------------
# CKYC Header / Versioning
# -----------------------------
ckyc.version=${CKYC_VERSION:1.3}
ckyc.fi-code=${CKYC_FI_CODE:IN0106}

# -----------------------------
# CKYC Certificates / Keys
# -----------------------------
ckyc.cersai-cert=${CKYC_CERSAI_CERT:classpath:keys/cersai.cer}
ckyc.p12-path=${CKYC_P12_PATH:classpath:keys/fi-keystore.p12}
ckyc.p12-password=${CKYC_P12_PASSWORD:changeit}
ckyc.p12-alias=${CKYC_P12_ALIAS:mykey}
ckyc.project-public-key-path=${CKYC_PROJECT_PUBLIC_KEY_PATH:classpath:keys/project-public.cer}
ckyc.project-private-key-path=${CKYC_PROJECT_PRIVATE_KEY_PATH:classpath:keys/project-private.key}
ckyc.ckyc-public-key-path=${CKYC_CKYC_PUBLIC_KEY_PATH:classpath:keys/ckyc-public.cer}
ckyc.ckyc-private-key-path=${CKYC_CKYC_PRIVATE_KEY_PATH:classpath:keys/ckyc-private.key}

# Allow Upload/Update direct API mode (non-standard as per CKYC public FAQ)
ckyc.allow-non-standard-upload-update-api=${CKYC_ALLOW_NON_STANDARD_UPLOAD_UPDATE_API:true}

# -----------------------------
# Timeouts
# -----------------------------
ckyc.timeout.connect-ms=${CKYC_CONNECT_TIMEOUT_MS:10000}
ckyc.timeout.read-ms=${CKYC_READ_TIMEOUT_MS:30000}

# -----------------------------
# Retry
# -----------------------------
ckyc.retry.max-attempts=${CKYC_RETRY_MAX_ATTEMPTS:3}
ckyc.retry.initial-backoff-ms=${CKYC_RETRY_INITIAL_BACKOFF_MS:500}
ckyc.retry.max-backoff-ms=${CKYC_RETRY_MAX_BACKOFF_MS:5000}
ckyc.retry.multiplier=${CKYC_RETRY_MULTIPLIER:2.0}

ckyc.download.otp-trigger-keywords[0]=OTP
ckyc.download.otp-trigger-keywords[1]=ONE TIME PASSWORD
ckyc.download.otp-trigger-keywords[2]=ENTER OTP

ckyc.upload.duplicate-keywords[0]=DUPLICATE
ckyc.upload.duplicate-keywords[1]=ALREADY EXISTS
ckyc.upload.duplicate-keywords[2]=RECORD EXISTS
ckyc.upload.max-image-bytes=${CKYC_MAX_IMAGE_BYTES:358400}
ckyc.upload.max-photo-bytes=${CKYC_MAX_PHOTO_BYTES:51200}
ckyc.upload.allowed-image-formats[0]=TIF
ckyc.upload.allowed-image-formats[1]=TIFF
ckyc.upload.allowed-image-formats[2]=PDF
ckyc.upload.allowed-image-formats[3]=JPEG
ckyc.upload.allowed-image-formats[4]=JPG

ckyc.validation.ckyc-no-length=${CKYC_NO_LENGTH:14}
ckyc.logging.max-payload-length=${CKYC_MAX_LOG_PAYLOAD_LENGTH:2000}

# -----------------------------
# Logging
# -----------------------------
logging.level.root=${APP_LOG_LEVEL_ROOT:INFO}
logging.level.com.example.ckyc=${APP_LOG_LEVEL_CKYC:INFO}

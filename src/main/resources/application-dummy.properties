# Activate with: --spring.profiles.active=dummy
spring.application.name=ckyc-client-dummy
server.port=8089

# Local dummy endpoints
ckyc.url=http://localhost:9090/mock-ckyc/search
ckyc.download-url=http://localhost:9090/mock-ckyc/download
ckyc.validate-otp-url=http://localhost:9090/mock-ckyc/validate-otp
ckyc.upload-url=http://localhost:9090/mock-ckyc/upload
ckyc.update-url=http://localhost:9090/mock-ckyc/update

ckyc.version=1.3
ckyc.fi-code=IN0106

# Keep local test certificates/keys for signing/encryption flow
ckyc.cersai-cert=classpath:keys/cersai.cer
ckyc.p12-path=classpath:keys/fi-keystore.p12
ckyc.p12-password=changeit
ckyc.p12-alias=mykey
ckyc.project-public-key-path=classpath:keys/project-public.cer
ckyc.project-private-key-path=classpath:keys/project-private.key
ckyc.ckyc-public-key-path=classpath:keys/ckyc-public.cer
ckyc.ckyc-private-key-path=classpath:keys/ckyc-private.key

ckyc.allow-non-standard-upload-update-api=true

ckyc.timeout.connect-ms=10000
ckyc.timeout.read-ms=30000

ckyc.retry.max-attempts=1
ckyc.retry.initial-backoff-ms=200
ckyc.retry.max-backoff-ms=1000
ckyc.retry.multiplier=2.0

ckyc.download.otp-trigger-keywords[0]=OTP
ckyc.download.otp-trigger-keywords[1]=ONE TIME PASSWORD
ckyc.download.otp-trigger-keywords[2]=ENTER OTP

ckyc.upload.duplicate-keywords[0]=DUPLICATE
ckyc.upload.duplicate-keywords[1]=ALREADY EXISTS
ckyc.upload.duplicate-keywords[2]=RECORD EXISTS

ckyc.upload.max-image-bytes=358400
ckyc.upload.max-photo-bytes=51200
ckyc.upload.allowed-image-formats[0]=TIF
ckyc.upload.allowed-image-formats[1]=TIFF
ckyc.upload.allowed-image-formats[2]=PDF
ckyc.upload.allowed-image-formats[3]=JPEG
ckyc.upload.allowed-image-formats[4]=JPG

ckyc.validation.ckyc-no-length=14
ckyc.logging.max-payload-length=2000

logging.level.root=INFO
logging.level.com.example.ckyc=INFO
